 "avg_price_hkd": "约 250–400", "signature_dishes": "炭烧烧鹅", "michelin_url": "https://guide.michelin.com/hk/en/hong-kong-region/hong-kong/restaurant/yue-kee", "lat": 22.368364, "lon": 114.0596883, "geo_source": "michelin_exact", "geocode_success": true, "geocode_query": "michelin_page_extraction", "geocode_display_name": "9 Sham Hong Road, Sham Tseng, Hong Kong, Hong Kong SAR China", "fallback_reason": "", "address_en": "9 Sham Hong Road, Sham Tseng, Hong Kong, Hong Kong SAR China"}];
    const cuisineGroups = {"粤菜 / 烧腊 / 港式小馆": {"color": "#D64C4C", "text": "#fff"}, "面食 / 云吞 / 车仔面": {"color": "#E1B93A", "text": "#1a1a1a"}, "点心 / 茶楼": {"color": "#43A36B", "text": "#fff"}, "潮州 / 客家 / 顺德": {"color": "#8A57C9", "text": "#fff"}, "京沪 / 上海 / 川菜": {"color": "#E0823F", "text": "#fff"}, "东南亚 / 印度 / 泰 / 越": {"color": "#4386D6", "text": "#fff"}, "日料 / 韩餐": {"color": "#2B2B2B", "text": "#fff"}, "西餐 / 其他": {"color": "#8C8F96", "text": "#fff"}};

    const map = L.map('map', {
      center: [22.302, 114.177],
      zoom: 11,
      zoomControl: true,
      preferCanvas: true
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const markerCluster = L.markerClusterGroup({
      showCoverageOnHover: false,
      spiderfyOnMaxZoom: true,
      maxClusterRadius: 48,
      iconCreateFunction: function(cluster) {
        return L.divIcon({
          html: `<div class="cluster-badge">${cluster.getChildCount()}</div>`,
          className: '',
          iconSize: [42, 42]
        });
      }
    });

    const markerLayer = L.layerGroup();
    let heatLayer = null;
    let currentMode = 'marker';
    const activeGroups = new Set(Object.keys(cuisineGroups));
    const markersById = new Map();
    const searchMap = new Map();

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
    }

    function popupHtml(item) {
      const fallbackNote = item.geo_source === 'district_fallback'
        ? `<div class="line"><strong>定位方式：</strong>区域 fallback（地图位置为近似点）</div>`
        : '';
      const newTag = item.is_new ? '<span class="tag">2026 新晋</span>' : '';
      const michelinLine = item.michelin_url
        ? `<div class="line"><a href="${item.michelin_url}" target="_blank" rel="noreferrer">查看米其林官方页面</a></div>`
        : '';
      return `
        <div class="popup">
          <h3>${escapeHtml(item.name_zh)}</h3>
          <div class="en">${escapeHtml(item.name_en)}</div>
          <div class="tags">
            <span class="tag">${escapeHtml(item.cuisine)}</span>
            <span class="tag">${escapeHtml(item.cuisine_group)}</span>
            ${newTag}
          </div>
          <div class="line"><strong>区域：</strong>${escapeHtml(item.area)}</div>
          <div class="line"><strong>地址：</strong>${escapeHtml(item.address || '未提供')}</div>
          <div class="line"><strong>人均：</strong>${escapeHtml(item.avg_price_hkd || '未提供')}</div>
          <div class="line"><strong>招牌菜：</strong>${escapeHtml(item.signature_dishes || '未提供')}</div>
          ${fallbackNote}
          ${michelinLine}
        </div>`;
    }

    function createMarker(item) {
      const groupStyle = cuisineGroups[item.cuisine_group] || cuisineGroups['西餐 / 其他'];
      const className = item.is_new ? 'marker-dot new' : 'marker-dot';
      const marker = L.marker([item.lat, item.lon], {
        title: `${item.name_zh} / ${item.name_en}`,
        icon: L.divIcon({
          className: '',
          html: `<div class="${className}" style="background:${groupStyle.color}"></div>`,
          iconSize: [18, 18],
          iconAnchor: [9, 9],
          popupAnchor: [0, -12]
        })
      }).bindPopup(popupHtml(item));
      marker.itemData = item;
      return marker;
    }

    restaurants.forEach(item => {
      const marker = createMarker(item);
      markersById.set(item.id, marker);
      searchMap.set(item.name_zh.toLowerCase(), item.id);
      searchMap.set(item.name_en.toLowerCase(), item.id);
      searchMap.set(item.name.toLowerCase(), item.id);
    });

    function visibleRestaurants() {
      return restaurants.filter(item => activeGroups.has(item.cuisine_group));
    }

    function refreshMapLayers() {
      markerCluster.clearLayers();
      markerLayer.clearLayers();
      const visible = visibleRestaurants();
      visible.forEach(item => {
        const marker = markersById.get(item.id);
        markerCluster.addLayer(marker);
      });
      if (currentMode === 'marker') {
        map.removeLayer(markerLayer);
        if (heatLayer) map.removeLayer(heatLayer);
        map.addLayer(markerCluster);
      } else {
        map.removeLayer(markerCluster);
        if (heatLayer) map.removeLayer(heatLayer);
        heatLayer = L.heatLayer(
          visible.map(item => [item.lat, item.lon, item.is_new ? 1.0 : 0.65]),
          { radius: 26, blur: 18, maxZoom: 16, gradient: {0.2:'#234f7d',0.45:'#2f8fd9',0.65:'#45c07c',0.82:'#f5c24d',1.0:'#e46955'} }
        );
        map.addLayer(heatLayer);
      }
      updateStats(visible);
    }

    function updateStats(items) {
      const counts = {'港岛':0,'九龙':0,'新界':0,'离岛':0};
      items.forEach(item => {
        if (counts[item.major_region] !== undefined) counts[item.major_region] += 1;
      });
      document.getElementById('statHongKongIsland').textContent = counts['港岛'];
      document.getElementById('statKowloon').textContent = counts['九龙'];
      document.getElementById('statNewTerritories').textContent = counts['新界'];
      document.getElementById('statOutlying').textContent = counts['离岛'];
    }

    const FilterControl = L.Control.extend({
      options: { position: 'topleft' },
      onAdd: function() {
        const div = L.DomUtil.create('div', 'floating-card control-block');
        div.innerHTML = `<div class="control-title">菜系筛选</div><div class="filter-list" id="filterList"></div><button class="mode-btn" id="toggleModeBtn">切换到热力图</button>`;
        L.DomEvent.disableClickPropagation(div);
        return div;
      }
    });

    const StatsControl = L.Control.extend({
      options: { position: 'topright' },
      onAdd: function() {
        const div = L.DomUtil.create('div', 'floating-card stats-panel');
        div.innerHTML = `
          <div class="control-title">当前可见区域统计</div>
          <div class="stats-grid">
            <div class="stat-item"><div class="stat-label">港岛</div><div class="stat-value" id="statHongKongIsland">0</div></div>
            <div class="stat-item"><div class="stat-label">九龙</div><div class="stat-value" id="statKowloon">0</div></div>
            <div class="stat-item"><div class="stat-label">新界</div><div class="stat-value" id="statNewTerritories">0</div></div>
            <div class="stat-item"><div class="stat-label">离岛</div><div class="stat-value" id="statOutlying">0</div></div>
          </div>`;
        L.DomEvent.disableClickPropagation(div);
        return div;
      }
    });

    map.addControl(new FilterControl());
    map.addControl(new StatsControl());

    const filterList = document.getElementById('filterList');
    const legendWrap = document.getElementById('legendWrap');
    Object.entries(cuisineGroups).forEach(([label, style]) => {
      const filterRow = document.createElement('label');
      filterRow.className = 'filter-item';
      filterRow.innerHTML = `<input type="checkbox" checked data-group="${label}"><span class="swatch" style="background:${style.color}"></span><span>${label}</span>`;
      filterList.appendChild(filterRow);

      const legendItem = document.createElement('div');
      legendItem.className = 'legend-item';
      legendItem.innerHTML = `<span class="swatch" style="background:${style.color}"></span><span>${label}</span>`;
      legendWrap.appendChild(legendItem);
    });

    filterList.addEventListener('change', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;
      const group = target.dataset.group;
      if (!group) return;
      if (target.checked) activeGroups.add(group); else activeGroups.delete(group);
      if (!activeGroups.size) {
        activeGroups.add(group);
        target.checked = true;
      }
      refreshMapLayers();
    });

    document.getElementById('toggleModeBtn').addEventListener('click', () => {
      currentMode = currentMode === 'marker' ? 'heat' : 'marker';
      document.getElementById('toggleModeBtn').textContent = currentMode === 'marker' ? '切换到热力图' : '切换到标记模式';
      refreshMapLayers();
    });

    const datalist = document.getElementById('restaurantOptions');
    restaurants.forEach(item => {
      const option = document.createElement('option');
      option.value = `${item.name_zh} / ${item.name_en}`;
      datalist.appendChild(option);
    });

    function locateRestaurant() {
      const raw = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!raw) return;
      const key = raw.includes(' / ') ? raw : raw;
      let id = searchMap.get(key);
      if (!id) {
        for (const item of restaurants) {
          if (`${item.name_zh} / ${item.name_en}`.toLowerCase() === raw || item.name_zh.toLowerCase() === raw || item.name_en.toLowerCase() === raw) {
            id = item.id;
            break;
          }
        }
      }
      if (!id) return;
      const item = restaurants.find(r => r.id === id);
      if (!activeGroups.has(item.cuisine_group)) {
        activeGroups.add(item.cuisine_group);
        Array.from(filterList.querySelectorAll('input')).forEach(input => {
          if (input.dataset.group === item.cuisine_group) input.checked = true;
        });
        refreshMapLayers();
      }
      currentMode = 'marker';
      document.getElementById('toggleModeBtn').textContent = '切换到热力图';
      refreshMapLayers();
      const marker = markersById.get(id);
      map.flyTo([item.lat, item.lon], 15, { duration: 0.8 });
      setTimeout(() => { marker.openPopup(); }, 400);
    }

    document.getElementById('searchBtn').addEventListener('click', locateRestaurant);
    document.getElementById('searchInput').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') locateRestaurant();
    });

    refreshMapLayers();
  </script>
</body>
