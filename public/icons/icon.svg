<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
    <linearGradient id="pin-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b476"/>
      <stop offset="100%" stop-color="#b8934a"/>
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141e2b"/>
      <stop offset="100%" stop-color="#0b1219"/>
    </linearGradient>
    <filter id="pin-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg-gradient)"/>

  <!-- Subtle radial highlight -->
  <circle cx="256" cy="230" r="160" fill="radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%)" opacity="0.5"/>

  <!-- Map pin body (within 80% safe zone: 51.2 to 460.8) -->
  <g filter="url(#pin-shadow)">
    <!-- Pin outer shape: teardrop/shield -->
    <path d="
      M256 395
      C256 395 168 290 168 215
      C168 166.4 207.4 127 256 127
      C304.6 127 344 166.4 344 215
      C344 290 256 395 256 395Z
    " fill="url(#pin-gradient)"/>

    <!-- Inner circle cutout for the utensil motif -->
    <circle cx="256" cy="215" r="62" fill="#0f1720"/>

    <!-- Fork (left side) -->
    <g fill="none" stroke="#c6a464" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Fork handle -->
      <line x1="237" y1="248" x2="237" y2="197"/>
      <!-- Fork tines -->
      <line x1="228" y1="197" x2="228" y2="183"/>
      <line x1="237" y1="197" x2="237" y2="183"/>
      <line x1="246" y1="197" x2="246" y2="183"/>
      <!-- Fork tine connectors -->
      <line x1="228" y1="197" x2="246" y2="197"/>
    </g>

    <!-- Spoon (right side) -->
    <g fill="none" stroke="#c6a464" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Spoon handle -->
      <line x1="275" y1="248" x2="275" y2="210"/>
      <!-- Spoon bowl -->
      <ellipse cx="275" cy="196" rx="12" ry="14" fill="#c6a464" stroke="none"/>
    </g>
  </g>
</svg>